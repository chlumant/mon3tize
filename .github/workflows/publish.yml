name: Publish to Maven Central

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create gradle.properties with decoded signing key
        run: |
          mkdir -p ~/.gradle

          echo "ossrhUsername=${{ secrets.OSSRHUSERNAME }}" >> ~/.gradle/gradle.properties
          echo "ossrhPassword=${{ secrets.OSSRHPASSWORD }}" >> ~/.gradle/gradle.properties
          echo "signing.keyId=650E303A" >> ~/.gradle/gradle.properties
          echo "signing.password=${{ secrets.SIGNING_PASSWORD }}" >> ~/.gradle/gradle.properties

          # Decode the base64 private key into the property
          echo -n "signing.secretKey=" >> ~/.gradle/gradle.properties
          echo "${{ secrets.SIGNING_SECRETKEY_BASE64 }}" | base64 --decode >> ~/.gradle/gradle.properties

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Publish to Maven Central
        run: ./gradlew publish --no-daemon --stacktrace --info
